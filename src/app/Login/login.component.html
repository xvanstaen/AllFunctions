<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<div  *ngIf="routing_code===0; else RespondContact">
    <!--
    <br> Device type is {{device_type}}
    <br> Screen width = {{getScreenWidth}}
    <br> Screen height = {{getScreenHeight}}
    <br><br>
    </div>
    -->


  <img  class="sizeMap" src="./assets/Lavender.JPG" >
    <div class="main_box">
    
    
      <h2 class="title "> Welcome  </h2>
 
      <h3 style="margin-top:20px; margin-left:15%; width:80%; text-align:center; color:blue">
        One more step to get all the information  
        <br>
        about the event you've been invited to
      </h3>

    <form class="form_box" [formGroup]="myForm" >

        <div>
            <label class="error_msg">  {{text_error}}</label>
        </div>
        <div>
            <label class="field-name">user-id</label>
            <input  class="input_field first-label" formControlName="userId" id="UserId" type="text"  >
            <div class="filler"><br> </div>
        </div>
        <div CLASS="second-label">
            <label class="field-name " >password</label>
            <input  class=" input_field"  formControlName="password" id="psw" type="password" > 
            <div class="filler"><br> </div>
      </div>
      
      <div >
            <button id='but_1' class="sizeButtons first-button"  (click)="ValidateData()">Send</button>
            <button id='but_2' class="sizeButtons" (click)="onClear()">Clear</button>
      </div>

  
    </form>
  </div>
</div>

<ng-template #RespondContact>
<div  *ngIf="routing_code===1; else firstevent">
  <app-Respond-Contact ></app-Respond-Contact>
</div> 
</ng-template>

<ng-template #firstevent>  
<div  *ngIf="routing_code===2; else secondevent">
    <app-Event-02JUL2022 ></app-Event-02JUL2022>
</div> 
</ng-template>

<ng-template #secondevent> 
    <div  *ngIf="routing_code===3">
      <app-Event-27AUG2022 ></app-Event-27AUG2022>
    </div> 
</ng-template>

</body>
